<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網站搬家通知 | 陶墨書法</title>
  
  <!-- 自動跳轉設定：3秒後導向 Vercel 網址 -->
  <meta http-equiv="refresh" content="3; url=https://calligraphy-calendar.vercel.app/">
  
  <!-- SEO：告訴搜尋引擎正式網址已更換 -->
  <link rel="canonical" href="https://calligraphy-calendar.vercel.app/" />
  
  <style>
    :root {
      --bg: #F8F8F5;
      --accent: #C9A962;
      --text: #1A1A1A;
    }
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 16px;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background-color: var(--text);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 500;
      transition: transform 0.2s, background-color 0.2s;
    }
    .btn:hover {
      background-color: var(--accent);
      transform: translateY(-2px);
    }
    .loader {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #AAA;
    }
    .dot {
      animation: blink 1.4s infinite both;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0% { opacity: .2; }
      20% { opacity: 1; }
      100% { opacity: .2; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">陶墨書法</div>
    <h1>網站已搬遷至新址</h1>
    <p>我們已將「書法比賽行事曆」升級至功能更強大的新平台，提供更精準的自動更新與互動體驗。</p>
    
    <a href="https://calligraphy-calendar.vercel.app/" class="btn">立即前往新站</a>
    
    <div class="loader">
      系統將在 3 秒內為您自動跳轉<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
  </div>
</body>
</html>
